<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cfSearch</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand">cf<span>Search</span></div>
        <div class="index-list" id="indexList"></div>
        <button class="new-index-btn" id="newIndexBtn">+ New index</button>
      </aside>

      <main class="main">
        <header class="searchbar">
          <input
            id="searchInput"
            type="search"
            placeholder="Search the selected index…"
            autocomplete="off"
            spellcheck="false"
            disabled
          />
          <div class="hint">
            <code>term</code> ·
            <code>"exact phrase"</code> ·
            <code>a AND b</code> ·
            <code>a OR b</code> ·
            <code>-exclude</code> ·
            <code>inv*</code> ·
            <code>/re.ex/</code> ·
            <code>fuzzy~1</code> ·
            <code>"near words"~5</code>
          </div>
        </header>

        <div class="status" id="status"></div>
        <div class="results" id="results"></div>
      </main>
    </div>

    <div class="modal-backdrop" id="modal" hidden>
      <div class="modal">
        <h2>New index</h2>
        <label class="field">
          Name
          <input id="indexName" type="text" placeholder="My Documents" autocomplete="off" />
        </label>
        <div class="field">
          Folders
          <div class="folder-list" id="folderList"></div>
          <button id="addFolderBtn" class="secondary small">Add folder…</button>
        </div>
        <div class="modal-error" id="modalError"></div>
        <div class="modal-actions">
          <button id="cancelCreate" class="secondary">Cancel</button>
          <button id="confirmCreate">Create &amp; build</button>
        </div>
      </div>
    </div>
  </body>
</html>
